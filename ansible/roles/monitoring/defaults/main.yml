prometheus_image: prom/prometheus:latest
grafana_image: grafana/grafana:latest

prometheus_config_dir: /opt/prometheus
prometheus_data_dir: /opt/prometheus/data

prometheus_port: 9090
grafana_port: 3000

grafana_data_dir: /opt/grafana
grafana_provisioning_dir: /opt/grafana/provisioning

monitoring_docker_network: monitoring

nginx_exporter_image: nginx/nginx-prometheus-exporter:1.1.0
nginx_exporter_port: 9113
