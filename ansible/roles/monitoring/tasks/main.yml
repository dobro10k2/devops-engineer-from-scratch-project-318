---
#
# Docker network for monitoring
#

- name: Create monitoring docker network
  community.docker.docker_network:
    name: monitoring

#
# Prometheus setup
#

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ monitoring_prometheus_config_dir }}"
    - "{{ monitoring_prometheus_data_dir }}"

- name: Set permissions for prometheus data
  ansible.builtin.file:
    path: "{{ monitoring_prometheus_data_dir }}"
    owner: 65534
    group: 65534
    mode: "0755"
    recurse: true

- name: Deploy prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_prometheus_config_dir }}/prometheus.yml"
    mode: "0644"
  notify: Restart prometheus

- name: Deploy alert rules
  ansible.builtin.template:
    src: alerts.yml.j2
    dest: "{{ monitoring_prometheus_config_dir }}/alerts.yml"
    mode: "0644"
  notify: Restart prometheus

- name: Run Prometheus container
  community.docker.docker_container:
    name: prometheus
    image: "{{ monitoring_prometheus_image }}"
    restart_policy: always

    ports:
      - 127.0.0.1:9090:9090

    networks:
      - name: monitoring

    volumes:
      - "{{ monitoring_prometheus_config_dir }}/prometheus.yml:/etc/prometheus/prometheus.yml"
      - "{{ monitoring_prometheus_config_dir }}/alerts.yml:/etc/prometheus/alerts.yml"
      - "{{ monitoring_prometheus_data_dir }}:/prometheus"

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

#
# Grafana setup
#

- name: Create Grafana directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"
  loop:
    - "{{ monitoring_grafana_data_dir }}"
    - "{{ monitoring_grafana_provisioning_dir }}"
    - "{{ monitoring_grafana_data_dir }}/dashboards"
    - "{{ monitoring_grafana_provisioning_dir }}/alerting"
    - "{{ monitoring_grafana_provisioning_dir }}/datasources"
    - "{{ monitoring_grafana_provisioning_dir }}/dashboards"
    - "{{ monitoring_grafana_provisioning_dir }}/plugins"

- name: Copy Grafana datasource config
  ansible.builtin.copy:
    src: grafana/provisioning/datasources/datasource.yml
    dest: "{{ monitoring_grafana_provisioning_dir }}/datasources/datasource.yml"
    mode: "0644"
  notify: Restart grafana

- name: Copy Grafana datasource config
  ansible.builtin.copy:
    src: grafana/provisioning/datasources/loki.yml
    dest: "{{ monitoring_grafana_provisioning_dir }}/datasources/loki.yml"
    mode: "0644"
  notify: Restart grafana

- name: Copy Grafana dashboards provisioning
  ansible.builtin.copy:
    src: grafana/provisioning/dashboards/dashboards.yml
    dest: "{{ monitoring_grafana_provisioning_dir }}/dashboards/dashboards.yml"
    mode: "0644"
  notify: Restart grafana

- name: Copy Grafana dashboards
  ansible.builtin.copy:
    src: grafana/dashboards/
    dest: "{{ monitoring_grafana_data_dir }}/dashboards/"
    owner: "472"
    group: "472"
    mode: "0755"
  notify: Restart grafana

- name: Deploy Grafana contact points with secrets
  ansible.builtin.template:
    src: grafana/contactpoints.yml.j2
    dest: "{{ monitoring_grafana_provisioning_dir }}/alerting/contactpoints.yml"
    mode: "0644"
  notify: Restart grafana

- name: Copy Grafana alerting provisioning
  ansible.builtin.copy:
    src: grafana/provisioning/alerting/
    dest: "{{ monitoring_grafana_provisioning_dir }}/alerting/"
    mode: "0644"
  notify: Restart grafana

- name: Run Grafana container
  community.docker.docker_container:
    name: grafana
    image: "{{ monitoring_grafana_image }}"
    restart_policy: always

    ports:
      - 127.0.0.1:3000:3000

    networks:
      - name: monitoring

    env:
      GF_SECURITY_ADMIN_USER: "{{ grafana_admin_user }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
      GF_SERVER_ROOT_URL: https://grafana.dobro10k2.ru
      GF_SERVER_DOMAIN: grafana.dobro10k2.ru
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"

    volumes:
      - "{{ monitoring_grafana_data_dir }}:/var/lib/grafana"
      - "{{ monitoring_grafana_provisioning_dir }}:/etc/grafana/provisioning"

- name: Wait for Grafana to be ready
  ansible.builtin.uri:
    url: http://localhost:3000/login
    status_code: 200
  register: monitoring_grafana_health
  retries: 10
  delay: 3
  until: monitoring_grafana_health.status == 200

#
# Install nginx and certbot
#

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Install certbot
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

#
# Deploy HTTP nginx config (bootstrap for certbot)
#

- name: Enable nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/monitoring
    dest: /etc/nginx/sites-enabled/monitoring
    state: link
    mode: "0644"

#
# Check if certificates exist
#

- name: Check Grafana certificate
  ansible.builtin.stat:
    path: /etc/letsencrypt/live/grafana.dobro10k2.ru/fullchain.pem
  register: monitoring_grafana_cert

- name: Check Prometheus certificate
  ansible.builtin.stat:
    path: /etc/letsencrypt/live/prometheus.dobro10k2.ru/fullchain.pem
  register: monitoring_prometheus_certprometheus_cert

#
# Obtain certificates (only if missing)
#

- name: Obtain Grafana certificate
  ansible.builtin.command: >
    certbot certonly --nginx
    -d grafana.dobro10k2.ru
    --non-interactive
    --agree-tos
    -m admin@dobro10k2.ru
  when: not monitoring_grafana_cert.stat.exists
  changed_when: false

- name: Obtain Prometheus certificate
  ansible.builtin.command: >
    certbot certonly --nginx
    -d prometheus.dobro10k2.ru
    --non-interactive
    --agree-tos
    -m admin@dobro10k2.ru
  when: not monitoring_prometheus_certprometheus_cert.stat.exists
  changed_when: false

#
# Deploy HTTPS nginx config
#

- name: Deploy HTTPS nginx config
  ansible.builtin.template:
    src: nginx-monitoring-https.conf.j2
    dest: /etc/nginx/sites-available/monitoring
    mode: "0644"
  notify: Reload nginx

- name: Run nginx prometheus exporter
  community.docker.docker_container:
    name: nginx-exporter
    image: "{{ monitoring_nginx_exporter_image }}"
    state: started
    restart_policy: always
    command:
      - -nginx.scrape-uri={{ nginx_status_url }}
    networks:
      - name: "{{ monitoring_docker_network }}"
    ports:
      - 127.0.0.1:{{ monitoring_nginx_exporter_port }}:9113

- name: Include Loki tasks
  ansible.builtin.include_tasks: loki.yml
  when: inventory_hostname in groups['monitoring']
