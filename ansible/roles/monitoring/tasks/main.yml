---
#
# Docker network for monitoring
#

- name: Create monitoring docker network
  community.docker.docker_network:
    name: monitoring


#
# Prometheus setup
#

- name: Create directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ prometheus_config_dir }}"
    - "{{ prometheus_data_dir }}"

- name: Set permissions for prometheus data
  file:
    path: "{{ prometheus_data_dir }}"
    owner: 65534
    group: 65534
    recurse: yes

- name: Deploy prometheus config
  template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
  notify: restart prometheus

- name: Deploy alert rules
  template:
    src: alerts.yml.j2
    dest: "{{ prometheus_config_dir }}/alerts.yml"
  notify: restart prometheus

- name: Run Prometheus container
  community.docker.docker_container:
    name: prometheus
    image: "{{ prometheus_image }}"
    restart_policy: always

    ports:
      - "127.0.0.1:9090:9090"

    networks:
      - name: monitoring

    volumes:
      - "{{ prometheus_config_dir }}/prometheus.yml:/etc/prometheus/prometheus.yml"
      - "{{ prometheus_config_dir }}/alerts.yml:/etc/prometheus/alerts.yml"
      - "{{ prometheus_data_dir }}:/prometheus"

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"


#
# Grafana setup
#

- name: Create Grafana directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"
  loop:
    - "{{ grafana_data_dir }}"
    - "{{ grafana_provisioning_dir }}"
    - "{{ grafana_data_dir }}/dashboards"

- name: Copy Grafana datasource config
  copy:
    src: grafana/provisioning/datasources/datasource.yml
    dest: "{{ grafana_provisioning_dir }}/datasources/datasource.yml"
  notify: restart grafana

- name: Copy Grafana dashboards provisioning
  copy:
    src: grafana/provisioning/dashboards/dashboards.yml
    dest: "{{ grafana_provisioning_dir }}/dashboards/dashboards.yml"
  notify: restart grafana

- name: Copy Grafana dashboards
  copy:
    src: grafana/dashboards/
    dest: "{{ grafana_data_dir }}/dashboards/"
    owner: "472"
    group: "472"
    mode: "0644"
  notify: restart grafana

- name: Run Grafana container
  community.docker.docker_container:
    name: grafana
    image: "{{ grafana_image }}"
    restart_policy: always

    ports:
      - "127.0.0.1:3000:3000"

    networks:
      - name: monitoring

    env:
      GF_SECURITY_ADMIN_USER: "{{ grafana_admin_user }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
      GF_SERVER_ROOT_URL: https://grafana.dobro10k2.ru
      GF_SERVER_DOMAIN: grafana.dobro10k2.ru
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"

    volumes:
      - "{{ grafana_data_dir }}:/var/lib/grafana"
      - "{{ grafana_provisioning_dir }}:/etc/grafana/provisioning"


#
# Install nginx and certbot
#

- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: true

- name: Install certbot
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present


#
# Deploy HTTP nginx config (bootstrap for certbot)
#

- name: Deploy HTTP nginx config
  template:
    src: nginx-monitoring-http.conf.j2
    dest: /etc/nginx/sites-available/monitoring

- name: Enable nginx site
  file:
    src: /etc/nginx/sites-available/monitoring
    dest: /etc/nginx/sites-enabled/monitoring
    state: link

- name: Reload nginx
  service:
    name: nginx
    state: reloaded


#
# Check if certificates exist
#

- name: Check Grafana certificate
  stat:
    path: /etc/letsencrypt/live/grafana.dobro10k2.ru/fullchain.pem
  register: grafana_cert

- name: Check Prometheus certificate
  stat:
    path: /etc/letsencrypt/live/prometheus.dobro10k2.ru/fullchain.pem
  register: prometheus_cert


#
# Obtain certificates (only if missing)
#

- name: Obtain Grafana certificate
  command: >
    certbot certonly --nginx
    -d grafana.dobro10k2.ru
    --non-interactive
    --agree-tos
    -m admin@dobro10k2.ru
  when: not grafana_cert.stat.exists

- name: Obtain Prometheus certificate
  command: >
    certbot certonly --nginx
    -d prometheus.dobro10k2.ru
    --non-interactive
    --agree-tos
    -m admin@dobro10k2.ru
  when: not prometheus_cert.stat.exists


#
# Deploy HTTPS nginx config
#

- name: Deploy HTTPS nginx config
  template:
    src: nginx-monitoring-https.conf.j2
    dest: /etc/nginx/sites-available/monitoring

- name: Reload nginx
  service:
    name: nginx
    state: reloaded
