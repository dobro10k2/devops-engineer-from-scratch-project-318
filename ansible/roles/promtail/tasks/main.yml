---
- name: Install unzip
  ansible.builtin.apt:
    name: unzip
    state: present
    update_cache: true

- name: Download Promtail
  ansible.builtin.get_url:
    url: https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip
    dest: /tmp/promtail.zip

- name: Unarchive Promtail
  ansible.builtin.unarchive:
    src: /tmp/promtail.zip
    dest: /usr/local/bin/
    remote_src: true
    creates: /usr/local/bin/promtail-linux-amd64

- name: Create config dir
  ansible.builtin.file:
    path: "{{ promtail_config_dir }}"
    state: directory

- name: Template config
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "{{ promtail_config_dir }}/config.yml"
  notify: restart promtail

- name: Create positions directory
  ansible.builtin.file:
    path: /var/lib/promtail
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Template systemd unit
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
  notify: restart promtail

- name: Start promtail
  ansible.builtin.systemd:
    name: promtail
    state: started
    enabled: true
    daemon_reload: true
