- name: Create directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ prometheus_config_dir }}"
    - "{{ prometheus_data_dir }}"

- name: Set permissions for prometheus data
  file:
    path: "{{ prometheus_data_dir }}"
    owner: 65534
    group: 65534
    recurse: yes

- name: Deploy prometheus config
  template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
  notify: restart prometheus

- name: Deploy alert rules
  template:
    src: alerts.yml.j2
    dest: "{{ prometheus_config_dir }}/alerts.yml"
  notify: restart prometheus

- name: Run Prometheus container
  community.docker.docker_container:
    name: prometheus
    image: "{{ prometheus_image }}"
    restart_policy: always

    ports:
      - "{{ prometheus_port }}:9090"

    volumes:
      - "{{ prometheus_config_dir }}/prometheus.yml:/etc/prometheus/prometheus.yml"
      - "{{ prometheus_config_dir }}/alerts.yml:/etc/prometheus/alerts.yml"
      - "{{ prometheus_data_dir }}:/prometheus"

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
